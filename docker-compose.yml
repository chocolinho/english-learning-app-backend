services:
  mysql:
    image: mysql:8.0
    container_name: english-mysql
    environment:
      MYSQL_ROOT_PASSWORD: thai2004
      MYSQL_DATABASE: english_learning_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: english-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/english_learning_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: thai2004

volumes:
  mysql_data: